<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Healthcare Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f0f13; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .kpi-card { background: #1c1c24; border: 1px solid #2d2d3a; border-radius: 12px; padding: 20px; text-align: center; }
        .chart-card { background: #1c1c24; border: 1px solid #2d2d3a; border-radius: 12px; padding: 20px; margin-top: 20px; }
        .insight-card { background: linear-gradient(135deg, #1e1b4b 0%, #1c1c24 100%); border-left: 5px solid #a855f7; border-radius: 12px; padding: 20px; margin-top: 20px; }
        .table-container { background: #1c1c24; border: 1px solid #2d2d3a; border-radius: 12px; padding: 20px; margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .bg-high { background: #ef4444; } .bg-medium { background: #f59e0b; } .bg-low { background: #22c55e; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h2 class="mb-4" style="color:#a855f7">AI HealthCare Anomaly Monitoring</h2>

        <div class="row g-3">
            <div class="col-md-3"><div class="kpi-card"><h6>Active Patients</h6><h2 id="p-count">--</h2></div></div>
            <div class="col-md-3"><div class="kpi-card"><h6>High Risk Alerts</h6><h2 id="risk-count" class="text-danger">0</h2></div></div>
            <div class="col-md-3"><div class="kpi-card"><h6>Current Score</h6><h2 id="avg-score">--</h2></div></div>
            <div class="col-md-3"><div class="kpi-card"><h6>Last Update</h6><h2 id="last-time" style="font-size:1.5rem">--</h2></div></div>
        </div>

        <div class="insight-card">
            <h6 class="text-muted small">GEMINI AI INSIGHT</h6>
            <p id="gemini-text" class="mb-0 fs-5 fw-bold">Waiting for data...</p>
        </div>

        <div class="row">
            <div class="col-md-6"><div class="chart-card"><canvas id="scoreChart"></canvas></div></div>
            <div class="col-md-6"><div class="chart-card"><canvas id="hrChart"></canvas></div></div>
        </div>

        <div class="table-container">
            <table class="table table-dark">
                <thead><tr><th>Time</th><th>Patient</th><th>HR</th><th>SpO2</th><th>Score</th><th>Status</th></tr></thead>
                <tbody id="log-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        const scoreCtx = document.getElementById('scoreChart').getContext('2d');
        let scoreChart = new Chart(scoreCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Anomaly Score',
                    borderColor: '#6366f1',
                    backgroundColor: 'rgba(99, 102, 241, 0.2)', // Light purple fill
                    data: [],
                    tension: 0.4,  // 📍 THIS MAKES IT SMOOTH
                    fill: true     // 📍 THIS MAKES IT AN AREA CHART
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        const hrCtx = document.getElementById('hrChart').getContext('2d');
        let hrChart = new Chart(hrCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Heart Rate',
                    borderColor: '#ef4444',
                    backgroundColor: 'rgba(239, 68, 68, 0.2)', // Light red fill
                    data: [],
                    tension: 0.4,  // 📍 THIS MAKES IT SMOOTH
                    fill: true     // 📍 THIS MAKES IT AN AREA CHART
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        async function update() {
            try {
                const res = await fetch('/api/alerts');
                const data = await res.json();
                if (data.length > 0) {
                    const last = data[data.length - 1];
                    document.getElementById('p-count').innerText = [...new Set(data.map(d => d.Patient_ID))].length;
                    document.getElementById('risk-count').innerText = data.filter(d => d.Severity === 'HIGH').length;
                    document.getElementById('avg-score').innerText = last.Score;
                    document.getElementById('last-time').innerText = last.Timestamp;
                    document.getElementById('gemini-text').innerText = last.Insight || "Stable";

                    const tableBody = document.getElementById('log-table');
                    tableBody.innerHTML = data.slice().reverse().map(d => `
                        <tr>
                            <td>${d.Timestamp}</td><td>${d.Patient_ID}</td><td>${d.Heart_Rate}</td>
                            <td>${d.SpO2}%</td><td>${d.Score}</td>
                            <td><span class="status-badge bg-${d.Severity.toLowerCase()}">${d.Severity}</span></td>
                        </tr>`).join('');

                    scoreChart.data.labels = data.map(d => d.Timestamp);
                    scoreChart.data.datasets[0].data = data.map(d => d.Score);
                    scoreChart.update('none');

                    hrChart.data.labels = data.map(d => d.Timestamp);
                    hrChart.data.datasets[0].data = data.map(d => d.Heart_Rate);
                    hrChart.update('none');
                }
            } catch (e) { console.log(e); }
        }
        setInterval(update, 2000);
    </script>
</body>
</html>
